name: Deploy to Hetzner (via Registry)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hetzner-registry
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ogt-web to Hetzner via Registry
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write      # For attestations
      attestations: write  # For GitHub attestations
      packages: write      # For GHCR push
    steps:
      - uses: actions/checkout@v4

      - uses: flakecache/nix-installer@v1.0.6

      - name: Build container image
        shell: bash
        env:
          COMPOSER_MAGENTO_USERNAME: ${{ secrets.COMPOSER_MAGENTO_USERNAME }}
          COMPOSER_MAGENTO_PASSWORD: ${{ secrets.COMPOSER_MAGENTO_PASSWORD }}
        run: |
          echo "Building container image with Nix..."
          nix build .#container --print-build-logs
          
          # Load the image into Docker
          echo "Loading image into Docker..."
          docker load < result
          
          # Tag for registry
          TAG="$(echo $GITHUB_SHA | cut -c1-8)"
          IMAGE_NAME="${REGISTRY:-ghcr.io}/${{ github.repository_owner }}/ogt-web"
          docker tag ogt-web:latest $IMAGE_NAME:$TAG
          docker tag ogt-web:latest $IMAGE_NAME:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GitHub Container Registry
        run: |
          TAG="$(echo $GITHUB_SHA | cut -c1-8)"
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/ogt-web"
          echo "Pushing $IMAGE_NAME:$TAG and $IMAGE_NAME:latest"
          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest

      - name: Deploy to Hetzner server
        shell: bash
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          TAG="$(echo $GITHUB_SHA | cut -c1-8)"
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/ogt-web"
          
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/hetzner_key
          chmod 600 ~/.ssh/hetzner_key
          ssh-keyscan -H $HETZNER_HOST >> ~/.ssh/known_hosts
          
          # Deploy on Hetzner server
          ssh -i ~/.ssh/hetzner_key $HETZNER_USER@$HETZNER_HOST << ENDSSH
            set -e
            
            # Login to GHCR if needed
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true
            
            # Pull latest image
            echo "Pulling latest image from registry..."
            docker pull $IMAGE_NAME:latest
            
            # Stop and remove old container
            echo "Stopping old container..."
            docker stop ogt-web || true
            docker rm ogt-web || true
            
            # Create data volume if it doesn't exist
            docker volume create magento_data || true
            
            # Run new container
            echo "Starting new container..."
            docker run -d \
              --name ogt-web \
              --restart unless-stopped \
              -p 8080:8080 \
              -v magento_data:/var/lib/mysql \
              -e SITE_ENV=production \
              -e ENABLE_GALERA=false \
              -e SITE_NAME=orgasmtoy.com \
              -e COMPOSER_MAGENTO_USERNAME="${{ secrets.COMPOSER_MAGENTO_USERNAME }}" \
              -e COMPOSER_MAGENTO_PASSWORD="${{ secrets.COMPOSER_MAGENTO_PASSWORD }}" \
              $IMAGE_NAME:latest
            
            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f
            
            # Health check
            echo "Waiting for container to be healthy..."
            sleep 10
            docker ps | grep ogt-web
            docker logs --tail 50 ogt-web
          ENDSSH
          
          # Cleanup
          rm -f ~/.ssh/hetzner_key
